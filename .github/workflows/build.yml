name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyqt6 pyqt6-qt6 pyqt6-sip faster-whisper yt-dlp pyinstaller numpy tokenizers sentencepiece

      - name: Verify imports
        run: |
          python -c "import ctranslate2; print('ctranslate2', ctranslate2.__version__)"
          python -c "import faster_whisper; print('faster_whisper OK')"
          python -c "import yt_dlp; print('yt_dlp OK')"
          python -c "from PyQt6 import QtCore; print('PyQt6', QtCore.PYQT_VERSION_STR)"
          python -c "import PyInstaller; print('PyInstaller', PyInstaller.__version__)"

      - name: Check ffmpeg
        run: ffmpeg -version | head -1

      - name: Build EXE
        run: python build.py

      - name: Zip EXE
        run: Compress-Archive -Path dist\VideoIngestMonitor.exe -DestinationPath dist\VideoIngestMonitor-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoIngestMonitor-windows
          path: dist/VideoIngestMonitor-windows.zip
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VideoIngestMonitor-windows.zip
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
