name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install Python dependencies
        run: pip install pyqt6 pyqt6-qt6 pyqt6-sip faster-whisper yt-dlp pyinstaller pillow numpy tokenizers sentencepiece

      - name: Build EXE
        run: python build.py

      - name: Zip output folder
        run: Compress-Archive -Path dist\VideoIngestMonitor -DestinationPath dist\VideoIngestMonitor-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoIngestMonitor-windows
          path: dist/VideoIngestMonitor-windows.zip
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VideoIngestMonitor-windows.zip
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
